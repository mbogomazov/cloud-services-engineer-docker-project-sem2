# Frontend nginx: serves the Vue SPA and reverse-proxies API calls to the
# backend service. Listens on 8080 because the container runs as a non-root
# user that cannot bind privileged ports (<1024).

server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip static assets.
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: fall back to index.html (mirrors public/_redirects).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for the backend API.
    # Uses Docker's embedded DNS (127.0.0.11) with a runtime variable so that
    # `docker compose up --scale backend=N` is load-balanced across replicas.
    location ~ ^/(products|categories|orders|auth|health|metrics|csrf) {
        resolver 127.0.0.11 valid=10s;
        set $upstream backend:8081;

        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
